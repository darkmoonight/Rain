name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart run slang
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: git diff --exit-code
      - run: dart run tool/validate_i18n.dart --fail-on-english
      - run: flutter analyze
      - run: flutter test --concurrency=1

  android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"
          cache: true
      - run: flutter pub get
      - run: dart run slang
      - run: flutter build apk --flavor floss --debug
